<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opinpin Official | Galactic Edition</title>
    <style>
        :root {
            --gold: #FFD700;
            --cosmic-pink: #ff69b4;
            --cosmic-purple: #8a2be2;
            --cosmic-blue: #4169e1;
            --black: #020205;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Exo 2', sans-serif;
            background-color: var(--black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* カラフルな宇宙背景アニメーション */
        .universe-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
            z-index: -2;
            overflow: hidden;
        }

        /* 星雲のゆらめき */
        .nebula {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 105, 180, 0.15), transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(138, 43, 226, 0.2), transparent 40%),
                radial-gradient(circle at 40% 70%, rgba(65, 105, 225, 0.15), transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255, 20, 147, 0.1), transparent 40%);
            filter: blur(60px);
            animation: nebula-move 20s linear infinite alternate;
        }

        @keyframes nebula-move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(5%, 5%) scale(1.1); }
        }

        /* 瞬く星々 */
        .stars-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://transparenttextures.com');
            opacity: 0.6;
            animation: twinkle 5s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.3; }
            to { opacity: 0.8; }
        }

        /* 流星 */
        .shooting-star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            box-shadow: 0 0 10px 2px white;
            border-radius: 50%;
            opacity: 0;
            animation: shoot 4s linear infinite;
        }

        @keyframes shoot {
            0% { transform: translate(100vw, 0) rotate(-45deg); opacity: 0; width: 0; }
            10% { opacity: 1; width: 100px; }
            20% { transform: translate(0, 100vh) rotate(-45deg); opacity: 0; width: 0; }
            100% { opacity: 0; }
        }

        /* レイアウト */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .product-card {
            display: flex;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 40px;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.2);
            overflow: hidden;
        }

        .image-box {
            flex: 1; min-width: 350px;
            padding: 40px;
            text-align: center;
        }

        .image-box img {
            max-width: 100%;
            filter: drop-shadow(0 0 25px var(--gold));
            animation: float 4s ease-in-out infinite;
        }

        .info-box {
            flex: 1; min-width: 350px;
            padding: 60px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
        }

        h1 {
            font-size: 3rem; margin: 0;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }

        .price { font-size: 2.2rem; margin: 20px 0; color: #fff; }

        .order-btn {
            padding: 20px 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--black);
            background: linear-gradient(to right, var(--gold), #fff700);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .order-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--gold);
        }

        .launching {
            transform: scale(0) translateY(-100vh) rotate(360deg);
            opacity: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="universe-container">
        <div class="nebula"></div>
        <div class="stars-overlay"></div>
        <div class="shooting-star" style="top: 10%; left: 80%; animation-delay: 0s;"></div>
        <div class="shooting-star" style="top: 30%; left: 90%; animation-delay: 2s;"></div>
    </div>

    <div class="container" id="mainContainer">
        <div class="product-card">
            <div class="image-box">
                <!-- キャラ画像URLをここに -->
                <img src="HH4t3GIa8AAW-qB.jpg" alt="Opinpin Hero">
            </div>
            <div class="info-box">
                <p style="color: var(--cosmic-pink); font-weight: bold; text-transform: uppercase;">Limited Space Collection</p>
                <h1>OPINPIN<br>STAR-LIGHT</h1>
                <div class="price">¥14,800 <span style="font-size: 1rem; color: #aaa;">(TAX INCL.)</span></div>
                <p style="color: #ddd; line-height: 1.6; margin-bottom: 30px;">
                    この宇宙に、あなたの輝きを。opinpin eSports Teamが放つ、ギャラクシー・リミテッドエディション。
                    星々のまたたきを再現したテキスタイルと、黄金の輝きが一つに。
                </p>
                <button class="order-btn" id="orderBtn">ORDER NOW</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('orderBtn').addEventListener('click', function() {
            const container = document.getElementById('mainContainer');
            this.innerText = "LAUNCHING...";
            
            // 宇宙へ飛んでいくアニメーション
            setTimeout(() => {
                container.classList.add('launching');
            }, 300);

            // 1.2秒後に注文フォームへ
            setTimeout(() => {
                window.location.href = "order-form.html";
            }, 1200);
        });
    </script>
</body>
</html>
